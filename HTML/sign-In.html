    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .font-serif-italic {
        font-family: "Playfair Display", serif;

  <body
    class="bg-[#fdfbf7] dark:bg-[#1a120b] min-h-screen flex flex-col justify-between text-slate-800 dark:text-amber-100 transition-colors duration-300 overflow-x-hidden"
  >
    <main
      class="w-full min-h-screen bg-[#dcc2b1] dark:bg-[#1a120b] p-4 sm:p-8 md:p-12 flex items-center justify-center font-sans transition-colors duration-300 relative"
    >
      <a
        href="../index.html"
        class="absolute top-6 right-6 bg-white/80 dark:bg-[#2c1d11]/80 text-[#4a3325] dark:text-gray-300 hover:bg-white dark:hover:bg-[#2c1d11] p-2.5 rounded-full shadow-md transition-all duration-200 z-30 group"
        aria-label="Close and return to home"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2.5"
          stroke="currentColor"
          class="w-5 h-5 transform group-hover:scale-110 transition"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </a>

      <div
        class="max-w-4xl w-full bg-white dark:bg-[#2c1d11] rounded-[2.5rem] shadow-2xl flex flex-col md:flex-row-reverse min-h-[550px] overflow-hidden border border-[#b98462]/10 dark:border-white/5 relative"
      >
        <div class="w-full md:w-[45%] relative min-h-[200px] md:min-h-full">
          <img
            src="../picture/registrerImg/smileCoffee.png"
            alt="Coffee latte art smile"
            class="absolute inset-0 w-full h-full object-cover"
          />
          <div
            class="absolute inset-0 bg-[#2c1d11]/5 dark:bg-[#1a120b]/30"
          ></div>
        </div>

        <div
          class="w-full md:w-[55%] p-8 sm:p-12 flex flex-col justify-center items-center relative"
        >
          <div class="text-center mb-6">
            <h2
              class="text-[#4a3325] dark:text-[#eedcd2] text-3xl font-black font-serif italic tracking-wide"
            >
              LinuxCafe
            </h2>
            <h3
              class="text-slate-800 dark:text-gray-200 text-lg font-bold mt-2"
            >
              Sign in your Account
            </h3>
          </div>

          <form action="#" class="w-full max-w-sm space-y-4">
            <div>
              <input
                type="email"
                class="w-full bg-white dark:bg-[#1a120b] border border-slate-300 dark:border-[#b98462]/40 text-[#4a3325] dark:text-white placeholder-gray-400 text-xs rounded-lg px-4 py-3 focus:ring-1 focus:ring-[#b58363] focus:border-[#b58363] block outline-none transition"
                placeholder="Enter your email"
                required
              />
            </div>

            <div>
              <input
                type="password"
                class="w-full bg-white dark:bg-[#1a120b] border border-slate-300 dark:border-[#b98462]/40 text-[#4a3325] dark:text-white placeholder-gray-400 text-xs rounded-lg px-4 py-3 focus:ring-1 focus:ring-[#b58363] focus:border-[#b58363] block outline-none transition"
                placeholder="Enter your password"
                required
              />
            </div>

            <button
              type="submit"
              class="w-full bg-[#b98462] hover:bg-[#a37050] text-white font-medium text-sm py-2.5 rounded-lg transition duration-200 shadow-sm cursor-pointer"
            >
              Sign In
            </button>

            <div class="relative flex py-2 items-center">
              <div
                class="flex-grow border-t border-gray-200 dark:border-gray-700"
              ></div>
              <span
                class="flex-shrink mx-3 text-[10px] text-gray-400 uppercase tracking-wider"
                >Continue with</span
              >
              <div
                class="flex-grow border-t border-gray-200 dark:border-gray-700"
              ></div>
            </div>

            <div class="flex justify-center space-x-4">
              <button
                type="button"
                class="p-1.5 rounded-full bg-slate-50 hover:bg-slate-100 border border-slate-200 transition cursor-pointer"
              >
                <img
                  src="https://www.svgrepo.com/show/475656/google-color.svg"
                  class="w-4 h-4"
                  alt="Google"
                />
              </button>
              <button
                type="button"
                class="p-1.5 rounded-full bg-slate-50 hover:bg-slate-100 border border-slate-200 transition cursor-pointer"
              >
                <img
                  src="https://www.svgrepo.com/show/475647/facebook-color.svg"
                  class="w-4 h-4"
                  alt="Facebook"
                />
              </button>
              <button
                type="button"
                class="p-1.5 rounded-full bg-slate-50 hover:bg-slate-100 border border-slate-200 transition cursor-pointer"
              >
                <img
                  src="https://www.svgrepo.com/show/513008/twitter-154.svg"
                  class="w-4 h-4"
                  alt="X"
                />
              </button>
            </div>

            <div
              class="text-center text-xs text-gray-500 dark:text-gray-400 pt-2"
            >
              Don't have any account
              <a
                href="./sign-up.html"
                class="text-[#b98462] dark:text-[#cfa487] font-semibold hover:underline ml-1"
                >Register</a
              >
            </div>
          </form>
        </div>
      </div>
    </main>
    <script src="../node_modules/flowbite/dist/flowbite.min.js"></script>
    <script src="../index.js"></script>
  </body>
</html>
